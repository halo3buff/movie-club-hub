root = "."
tmp_dir = "tmp"

[build]
  cmd        = "go build -o ./tmp/server ./cmd/server"
  entrypoint = "./tmp/server"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "migrations", "cmd/seed", "cmd/migrate", "cmd/reset-password"]
  delay      = 500

[log]
  time = false

[color]
  build = "yellow"
  runner = "green"
